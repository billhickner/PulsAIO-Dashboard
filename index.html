<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>PulsAIO Command Center - Grok v2.5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0057B8; --accent: #00A3E0; --green: #00C48C; --red: #E84C4C; --dark: #0D1B2A; --bg: #F0F4F8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; line-height: 1.5; }
.header { background: var(--primary); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
.nav button { background: none; border: none; color: rgba(255,255,255,0.9); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
.nav button.active { background: rgba(255,255,255,0.3); }
.card { background: white; border-radius: 12px; padding: 24px; margin: 20px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
h2 { color: var(--primary); margin-bottom: 16px; }
button.primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; }
textarea, input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; resize: vertical; }
.item-row { padding: 12px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
.journal-entry { background: #f8fafc; padding: 16px; margin: 12px 0; border-radius: 8px; border-left: 5px solid var(--primary); }
.pilot-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; margin-bottom: 16px; background: #fdfdfd; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PulsAIO</div>
  <div class="nav">
    <button class="active" onclick="showTab('today')">Today</button>
    <button onclick="showTab('pilots')">Pilots</button>
    <button onclick="showTab('goals')">Goals</button>
    <button onclick="showTab('calendar')">Calendar</button>
    <button onclick="showTab('max')">Max</button>
    <button onclick="showTab('projects')">Projects</button>
  </div>
</div>

<!-- Today Tab -->
<div id="tab-today" class="page">
  <div class="card">
    <h2>Daily Journal</h2>
    <textarea id="journalInput" rows="4" placeholder="What's driving your decisions today, Bill?"></textarea>
    <br><br>
    <button class="primary" onclick="saveEntry()">Save Entry</button>
  </div>

  <div class="card">
    <h2>Journal History</h2>
    <div id="journalList"></div>
  </div>

  <div class="card">
    <h2>Today's Tasks</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="taskInput" placeholder="New task..." style="flex:1">
      <button class="primary" onclick="addTask()">Add</button>
    </div>
    <div id="taskList"></div>
  </div>

  <div class="card">
    <h2>Reminders</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="reminderInput" placeholder="New reminder..." style="flex:1">
      <button class="primary" onclick="addReminder()">Add</button>
    </div>
    <div id="reminderList"></div>
  </div>

  <div class="card">
    <h2>Memory Bank for Max</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="memoryInput" placeholder="Something for Max to remember..." style="flex:1">
      <button class="primary" onclick="addMemory()">Save</button>
    </div>
    <div id="memoryList"></div>
  </div>
</div>

<!-- Pilots Tab -->
<div id="tab-pilots" class="page hidden">
  <div class="card">
    <h2>Active Pilot Stores</h2>
    <div id="pilotsList"></div>
  </div>
</div>

<!-- Other Tabs -->
<div id="tab-goals" class="page hidden"><div class="card"><h2>Goals</h2><p>Goals tracking — let me know what you want here.</p></div></div>
<div id="tab-calendar" class="page hidden"><div class="card"><h2>Calendar</h2><p>Calendar + UTBSC schedule coming next.</p></div></div>
<div id="tab-max" class="page hidden">
  <div class="card">
    <h2>Max AI Assistant</h2>
    <button class="primary" onclick="startVoiceInput()" style="width:100%; padding:16px; font-size:16px;">🎤 Speak to Max (Voice Input)</button>
    <div id="maxResponse" style="margin-top:20px; min-height:120px; padding:16px; background:#f8fafc; border-radius:8px;"></div>
  </div>
</div>
<div id="tab-projects" class="page hidden"><div class="card"><h2>Projects</h2><p>Project management coming next.</p></div></div>

<script>
// Data & Persistence
let journalEntries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
let memories = JSON.parse(localStorage.getItem('memories') || '[]');

const pilots = [
  {name: "David Glaser", status: "Active", goal: "$8K/month recurring", notes: "Modbus integration"},
  {name: "Laurie Glaser", status: "Active", goal: "$6K/month recurring", notes: "Pilot live"},
  {name: "One Medical Houston", status: "Active", goal: "$7K/month recurring", notes: "Expansion in discussion"},
  {name: "Kevin Moore", status: "Planning", goal: "$4K/month recurring", notes: "Initial contact"}
];

function saveAll() {
  localStorage.setItem('journalEntries', JSON.stringify(journalEntries));
  localStorage.setItem('tasks', JSON.stringify(tasks));
  localStorage.setItem('reminders', JSON.stringify(reminders));
  localStorage.setItem('memories', JSON.stringify(memories));
}

function showTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
}

function saveEntry() {
  const input = document.getElementById('journalInput');
  const text = input.value.trim();
  if (!text) return alert("Please type something in the journal.");
  journalEntries.unshift({id: Date.now(), date: new Date().toLocaleDateString(), text});
  saveAll();
  alert("✅ Journal entry saved!");
  input.value = '';
  renderJournal();
}

function renderJournal() {
  const list = document.getElementById('journalList');
  list.innerHTML = journalEntries.length === 0 
    ? '<p style="color:#888">No journal entries yet.</p>'
    : journalEntries.map(e => `<div class="journal-entry"><small>${e.date}</small><p>${e.text}</p></div>`).join('');
}

// Tasks
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({id: Date.now(), text, done: false});
  saveAll();
  input.value = '';
  renderTasks();
}
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = tasks.map(t => `
    <div class="item-row">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <span style="${t.done ? 'text-decoration:line-through;color:#888' : ''}">${t.text}</span>
      <button onclick="deleteTask(${t.id})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;">×</button>
    </div>
  `).join('');
}
function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t); saveAll(); renderTasks(); }
function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); saveAll(); renderTasks(); }

// Reminders
function addReminder() {
  const input = document.getElementById('reminderInput');
  const text = input.value.trim();
  if (!text) return;
  reminders.push({id: Date.now(), text, done: false});
  saveAll();
  input.value = '';
  renderReminders();
}
function renderReminders() {
  const list = document.getElementById('reminderList');
  list.innerHTML = reminders.map(r => `
    <div class="item-row">
      <input type="checkbox" ${r.done ? 'checked' : ''} onchange="toggleReminder(${r.id})">
      <span style="${r.done ? 'text-decoration:line-through;color:#888' : ''}">${r.text}</span>
      <button onclick="deleteReminder(${r.id})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;">×</button>
    </div>
  `).join('');
}
function toggleReminder(id) { reminders = reminders.map(r => r.id === id ? {...r, done: !r.done} : r); saveAll(); renderReminders(); }
function deleteReminder(id) { reminders = reminders.filter(r => r.id !== id); saveAll(); renderReminders(); }

// Memory
function addMemory() {
  const input = document.getElementById('memoryInput');
  const text = input.value.trim();
  if (!text) return;
  memories.unshift({id: Date.now(), text});
  saveAll();
  input.value = '';
  renderMemories();
}
function renderMemories() {
  const list = document.getElementById('memoryList');
  list.innerHTML = memories.map(m => `
    <div class="item-row">
      <span>${m.text}</span>
      <button onclick="deleteMemory(${m.id})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;">×</button>
    </div>
  `).join('');
}
function deleteMemory(id) { memories = memories.filter(m => m.id !== id); saveAll(); renderMemories(); }

// Pilots
function renderPilots() {
  const list = document.getElementById('pilotsList');
  list.innerHTML = pilots.map(p => `
    <div class="pilot-card">
      <strong>${p.name}</strong><br>
      <span style="color:var(--green)">${p.status}</span> — ${p.goal}<br>
      <small>${p.notes}</small>
    </div>
  `).join('');
}

function startVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Voice input not supported in this browser.");
  const recognition = new SpeechRecognition();
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('maxResponse').innerHTML = `<strong>You said:</strong> ${transcript}<br><em>Max would respond here...</em>`;
  };
  recognition.start();
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  console.log('%c✅ Grok v2.5 Full Rebuild loaded successfully', 'color:#00C48C;font-weight:bold');
  renderJournal();
  renderTasks();
  renderReminders();
  renderMemories();
  renderPilots();
  showTab('today');
});
</script>
</body>
</html>
