<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>PulsAIO Command Center - Grok v1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0057B8;
  --accent: #00A3E0;
  --gold: #F5A623;
  --green: #00C48C;
  --red: #E84C4C;
  --dark: #0D1B2A;
  --bg: #F0F4F8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
.header { background: var(--primary); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
.nav button { background: none; border: none; color: rgba(255,255,255,0.85); padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
.nav button.active { background: rgba(255,255,255,0.25); color: white; }
.card { background: white; border-radius: 12px; padding: 24px; margin: 20px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
h2 { color: var(--primary); margin-bottom: 16px; }
button.primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; }
textarea { width: 100%; height: 140px; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PulsAIO</div>
  <div class="nav">
    <button class="active" onclick="showTab('today')">Today</button>
    <button onclick="showTab('pilots')">Pilots</button>
    <button onclick="showTab('goals')">Goals</button>
    <button onclick="showTab('calendar')">Calendar</button>
    <button onclick="showTab('max')">Max</button>
    <button onclick="showTab('projects')">Projects</button>
  </div>
</div>

<!-- Today Tab -->
<div id="tab-today" class="page">
  <div class="card">
    <h2>Daily Journal</h2>
    <textarea id="journalInput" placeholder="What's driving your decisions today, Bill?"></textarea>
    <br><br>
    <button class="primary" onclick="saveEntry()">Save Entry</button>
  </div>
</div>

<!-- Placeholder Tabs -->
<div id="tab-pilots" class="page hidden"><div class="card"><h2>Pilots</h2><p>Pilot store tracking coming soon.</p></div></div>
<div id="tab-goals" class="page hidden"><div class="card"><h2>Goals</h2><p>Goals tracking coming soon.</p></div></div>
<div id="tab-calendar" class="page hidden"><div class="card"><h2>Calendar</h2><p>Calendar + UTBSC schedule coming soon.</p></div></div>
<div id="tab-max" class="page hidden"><div class="card"><h2>Max AI Assistant</h2><p>Voice input and conversation with Max coming soon.</p></div></div>
<div id="tab-projects" class="page hidden"><div class="card"><h2>Projects</h2><p>Project management coming soon.</p></div></div>

<script>
// Grok v1 - Clean build for Bill Hickner
function showTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
}

function saveEntry() {
  const input = document.getElementById('journalInput');
  const text = input.value.trim();
  if (!text) {
    alert("Please type something in the journal box.");
    return;
  }
  alert("✅ Journal entry saved successfully!\n\n" + text);
  input.value = '';
  console.log('✅ Journal saved');
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  console.log('%c✅ Grok v1 Clean PulsAIO Command Center loaded successfully', 'color:#00C48C;font-weight:bold');
  showTab('today');
});
</script>
</body>
</html>
