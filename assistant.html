<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PulsAIO Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background: #f0f4f8; padding: 20px; max-width: 800px; margin: 0 auto; }
h1 { color: #0057b8; }
.card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin: 20px 0; }
button { background: #00c48c; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 50px; cursor: pointer; }
button:hover { background: #00a36f; }
#output { margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 8px; min-height: 100px; }
</style>
</head>
<body>

<h1>PulsAIO Assistant</h1>

<div class="card">
  <h2>Max Voice Assistant</h2>
  <p>Click the button and speak. Max will listen and take notes for your jobs or projects.</p>
  <button onclick="startListening()">🎤 Speak to Max</button>
  <div id="output"></div>
</div>

<script>
function startListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('output').innerHTML = "Voice not supported in this browser. Please use Chrome.";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  
  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    document.getElementById('output').innerHTML = `
      <strong>You said:</strong> ${transcript}<br><br>
      <strong>Max:</strong> Got it, Bill. I've noted that.<br>
      What would you like me to do with this note (add to project, job, supply list, etc.)?
    `;
  };

  recognition.onerror = function() {
    document.getElementById('output').innerHTML = "Voice recognition error. Please try again.";
  };

  recognition.start();
}

console.log("PulsAIO Assistant loaded - try the voice button");
</script>

</body>
</html>
